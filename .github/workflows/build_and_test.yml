name: Pamplejuce

on:
  workflow_dispatch: # lets you run a build from the UI
  push:
  pull_request:

# When pushing new commits, cancel any running builds on that branch
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  BUILD_DIR: Builds
  DISPLAY: :0 # linux pluginval needs this
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  SCCACHE_GHA_ENABLED: true
  SCCACHE_CACHE_MULTIARCH: 1
  IPP_DIR: C:\Program Files (x86)\Intel\oneAPI\ipp\latest\lib\cmake\ipp
  INCLUDE_RESOURCES: true

defaults:
  run:
    shell: bash

# jobs are run in parallel on different machines
# all steps run in series
jobs:
  build_and_test:
    # don't double run on PRs
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # show all errors for each platform (vs. cancel jobs on error)
      matrix:
        include:
 #         - name: Linux
 #           os: ubuntu-22.04
 #           pluginval-binary: ./pluginval
 #           extra-flags: -G Ninja
          - name: macOS
            os: macos-14
            pluginval-binary: pluginval.app/Contents/MacOS/pluginval
            extra-flags: -G Ninja -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
#          - name: Windows
#            os: windows-latest
#            pluginval-binary: ./pluginval.exe

    steps:
      # Setup MSVC toolchain and developer command prompt (Windows)
      - uses: ilammy/msvc-dev-cmd@v1

      # Use clang on Linux so we don't introduce a 3rd compiler (Windows and macOS use MSVC and Clang)
      - name: Set up Clang
        if: runner.os == 'Linux'
        uses: egor-tensin/setup-clang@v1

      # This also starts up our "fake" display (Xvfb), needed for pluginval
      - name: Install JUCE's Linux Deps
        if: runner.os == 'Linux'
        # Thanks to McMartin & co https://forum.juce.com/t/list-of-juce-dependencies-under-linux/15121/44
        run: |
          sudo apt-get update && sudo apt install libasound2-dev libx11-dev libxinerama-dev libxext-dev libfreetype6-dev libwebkit2gtk-4.0-dev libglu1-mesa-dev xvfb ninja-build
          sudo /usr/bin/Xvfb $DISPLAY &

      - name: Cache IPP (Windows)
        if: runner.os == 'Windows'
        id: cache-ipp
        uses: actions/cache@v4
        with:
          key: ipp-v6
          path: C:\Program Files (x86)\Intel

      - name: Install IPP (Windows)
        if: (runner.os == 'Windows') && (steps.cache-ipp.outputs.cache-hit != 'true')
        run: |
          curl --output oneapi.exe https://registrationcenter-download.intel.com/akdlm/IRC_NAS/2e89fab4-e1c7-4f14-a1ef-6cddba8c5fa7/intel-ipp-2022.0.0.796_offline.exe
          ./oneapi.exe -s -x -f oneapi
          ./oneapi/bootstrapper.exe -s -c --action install --components=intel.oneapi.win.ipp.devel --eula=accept -p=NEED_VS2022_INTEGRATION=1 --log-dir=.

      - name: Save IPP cache (even on CI fail)
        if: runner.os == 'Windows' && (steps.cache-ipp.outputs.cache-hit != 'true')
        uses: actions/cache/save@v4
        with:
          path: C:\Program Files (x86)\Intel
          key: ipp-v6

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Install macOS Deps
        if: ${{ matrix.name == 'macOS' }}
        run: brew install ninja osxutils gettext
        # gettext provides envsubst

      # This block can be removed once 15.1 is default (JUCE requires it when building on macOS 14)
      - name: Use latest Xcode on system (macOS)
        if: ${{ matrix.name == 'macOS' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Cache the build
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure
        run: cmake -B ${{ env.BUILD_DIR }} -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE}} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ${{ matrix.extra-flags }} .

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }}

#      - name: Test & Benchmarks
#       working-directory: ${{ env.BUILD_DIR }}
#       run: ctest --verbose --output-on-failure

      - name: Read in .env from CMake # see GitHubENV.cmake
        run: |
          cat .env # show us the config
          cat .env >> $GITHUB_ENV # pull in our PRODUCT_NAME, etc

      - name: Set additional env vars for next steps
        run: |
          ARTIFACTS_PATH=${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}
          echo "ARTIFACTS_PATH=$ARTIFACTS_PATH" >> $GITHUB_ENV
          echo "VST3_PATH=$ARTIFACTS_PATH/VST3/${{ env.PRODUCT_NAME }}.vst3" >> $GITHUB_ENV
          echo "AU_PATH=$ARTIFACTS_PATH/AU/${{ env.PRODUCT_NAME }}.component" >> $GITHUB_ENV
          echo "AUV3_PATH=$ARTIFACTS_PATH/AUv3/${{ env.PRODUCT_NAME }}.appex" >> $GITHUB_ENV
          echo "STANDALONE_PATH=$ARTIFACTS_PATH/Standalone/${{ env.PRODUCT_NAME }}.app" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-${{ matrix.name }}" >> $GITHUB_ENV

#      - name: Pluginval
#        run: |
#          curl -LO "https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_${{ matrix.name }}.zip"
#          7z x pluginval_${{ matrix.name }}.zip
#          ${{ matrix.pluginval-binary }} --strictness-level 10 --verbose --validate "${{ env.VST3_PATH }}"

      - name: Import Certificates (macOS)
        uses: sudara/basic-macos-keychain-action@v1
        id: keychain
        if: ${{ matrix.name == 'macOS'}}
        with:
          dev-id-app-cert: ${{ secrets.DEV_ID_APP_CERT }}
          dev-id-app-password: ${{ secrets.DEV_ID_APP_PASSWORD }}
          dev-id-installer-cert: ${{ secrets.DEV_ID_INSTALLER_CERT }}
          dev-id-installer-password: ${{ secrets.DEV_ID_INSTALLER_PASSWORD }}

      - name: Codesign (macOS)
        if: ${{ matrix.name == 'macOS' }}
        timeout-minutes: 5
        run: |
          # Each plugin must be code signed
          # Sign internal binaries first to ensure entitlements are baked into the code
          codesign --force -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.VST3_PATH }}/Contents/MacOS/${{ env.PRODUCT_NAME }}" --options=runtime --entitlements packaging/entitlements.entitlements --timestamp
          codesign --force -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.AU_PATH }}/Contents/MacOS/${{ env.PRODUCT_NAME }}" --options=runtime --entitlements packaging/entitlements.entitlements --timestamp
          codesign --force -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.STANDALONE_PATH }}/Contents/MacOS/${{ env.PRODUCT_NAME }}" --options=runtime --entitlements packaging/entitlements.entitlements --timestamp

          # Then sign the outer bundles
          codesign --force -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.VST3_PATH }}" --options=runtime --entitlements packaging/entitlements.entitlements --timestamp
          codesign --force -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.AU_PATH }}" --options=runtime --entitlements packaging/entitlements.entitlements --timestamp
          codesign --force -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.STANDALONE_PATH }}" --options=runtime --entitlements packaging/entitlements.entitlements --timestamp

      - name: Add Custom Icons (macOS)
        if: ${{ matrix.name == 'macOS' }}
        run: |
          # add the icns as its own icon resource (meta!)
          # We use the icon generated by JUCE for the standalone app
          STANDALONE_ICON="${{ env.STANDALONE_PATH }}/Contents/Resources/AppIcon.icns"
          sips -i "$STANDALONE_ICON"

          # Grab the resource, put in tempfile
          DeRez -only icns "$STANDALONE_ICON" > /tmp/icons

          # Stuff the resource into the strange Icon? file's resource fork
          Rez -a /tmp/icons -o "${{ env.VST3_PATH }}/Icon"$'\r'
          Rez -a /tmp/icons -o "${{ env.AU_PATH }}/Icon"$'\r'
          #Rez -a /tmp/icons -o "${{ env.CLAP_PATH }}/Icon"$'\r'

          # Set custom icon attribute
          SetFile -a C "${{ env.VST3_PATH }}"
          SetFile -a C "${{ env.AU_PATH }}"

      - name: pkgbuild, Productbuild and Notarize
        if: ${{ matrix.name == 'macOS' }}
        timeout-minutes: 45
        run: |
          VERSION=$(cat VERSION)
          
          # Clean up any existing pkg files from previous runs
          rm -f packaging/*.pkg
          
          # 1. Common package-building section
          pkgbuild --identifier "${{ env.BUNDLE_ID }}.au.pkg" --version $VERSION --component "${{ env.AU_PATH }}" --install-location "/Library/Audio/Plug-Ins/Components"  "packaging/${{ env.PRODUCT_NAME }}.au.pkg"
          pkgbuild --identifier "${{ env.BUNDLE_ID }}.vst3.pkg" --version $VERSION --component "${{ env.VST3_PATH }}" --install-location "/Library/Audio/Plug-Ins/VST3" "packaging/${{ env.PRODUCT_NAME }}.vst3.pkg"

          # Standalone
          pkgbuild --analyze --root "$(dirname "${{ env.STANDALONE_PATH }}")" standalone.plist
          plutil -replace BundleIsRelocatable -bool NO standalone.plist
          pkgbuild --identifier "${{ env.BUNDLE_ID }}.app.pkg" --version $VERSION --root "$(dirname "${{ env.STANDALONE_PATH }}")" --component-plist standalone.plist --install-location "/Applications" "packaging/${{ env.PRODUCT_NAME }}.app.pkg"

          # MTS-ESP runtime library
          MTS_ROOT="packaging/mts_root/Library/Application Support/MTS-ESP"
          mkdir -p "$MTS_ROOT"
          cp "third_party/MTS-ESP/libMTS/Mac/x86_64_ARM/libMTS.dylib" "$MTS_ROOT/libMTS.dylib"
          xattr -c "$MTS_ROOT/libMTS.dylib"
          codesign --force -s "${{ secrets.DEVELOPER_ID_APPLICATION }}" -v "$MTS_ROOT/libMTS.dylib" --options=runtime --timestamp
          pkgbuild --identifier "${{ env.BUNDLE_ID }}.mtsesp.pkg" --version $VERSION --root "packaging/mts_root" --install-location "/" "packaging/${{ env.PRODUCT_NAME }}.mtsesp.pkg"

          # 2. Optional preparation of the resources component package
          if [ "${{ env.INCLUDE_RESOURCES }}" = "true" ]; then
            mkdir -p packaging/pkg_scripts/resources
            curl -L "https://manyarrowsmusic.com/bitKlavier/bitKlavier_InstallerResources.zip" -o "packaging/pkg_scripts/resources/resources.zip"
            cp packaging/resources/postinstall packaging/pkg_scripts/resources/postinstall
            chmod +x packaging/pkg_scripts/resources/postinstall

            # Additional Resources Component (Estimated at 1.3GB = 1153434 KB)
            mkdir -p packaging/empty_root
            pkgbuild --identifier "${{ env.BUNDLE_ID }}.resources.pkg" --version $VERSION --root packaging/empty_root --scripts packaging/pkg_scripts/resources --install-location "/tmp/.bitKlavierResources" "packaging/${{ env.PRODUCT_NAME }}.resources.pkg"
            
            # Force the installer to report 1.3GB for the resources package
            pkgutil --expand "packaging/${{ env.PRODUCT_NAME }}.resources.pkg" "packaging/resources_expanded"
            sed -i '' 's/installKBytes="0"/installKBytes="1153434"/' "packaging/resources_expanded/PackageInfo"
            pkgutil --flatten "packaging/resources_expanded" "packaging/${{ env.PRODUCT_NAME }}.resources.pkg"
            rm -rf "packaging/resources_expanded"
          fi

          # 3. Helper function for building the product installer
          build_product_installer() {
            local SUFFIX=$1
            local INCLUDE_RES=$2
            local OUTPUT_PKG="${{ env.ARTIFACT_NAME }}-${SUFFIX}.pkg"

            if [ "$INCLUDE_RES" = "true" ]; then
              export RESOURCES_CHOICE_LINE='<line choice="resources" />'
              export RESOURCES_CHOICE_DEFINITION="<choice id=\"resources\" visible=\"true\" start_selected=\"true\" title=\"Additional Resources (Sound Samples)\"><pkg-ref id=\"${{ env.BUNDLE_ID }}.resources.pkg\" version=\"${VERSION}\" onConclusion=\"none\">${{ env.PRODUCT_NAME }}.resources.pkg</pkg-ref></choice>"
            else
              export RESOURCES_CHOICE_LINE=""
              export RESOURCES_CHOICE_DEFINITION=""
            fi

            # Create the distribution.xml from the template
            export PRODUCT_NAME=${{ env.PRODUCT_NAME }}
            export BUNDLE_ID=${{ env.BUNDLE_ID }}
            export VERSION=$VERSION

            if [ -f /usr/local/opt/gettext/bin/envsubst ]; then
              ENVSUBST=/usr/local/opt/gettext/bin/envsubst
            elif [ -f /opt/homebrew/opt/gettext/bin/envsubst ]; then
              ENVSUBST=/opt/homebrew/opt/gettext/bin/envsubst
            else
              ENVSUBST=envsubst
            fi
            if [ ! -f "distribution.xml.template" ]; then
              echo "Error: distribution.xml.template not found in $(pwd)"
              ls -l
              exit 1
            fi
            $ENVSUBST < distribution.xml.template > distribution.xml

            # Build the final installer
            productbuild --resources ./resources --distribution distribution.xml --sign "${{ secrets.DEVELOPER_ID_INSTALLER }}" --timestamp "$OUTPUT_PKG"

            # Notarize and staple
            xcrun notarytool submit "$OUTPUT_PKG" --apple-id ${{ secrets.NOTARIZATION_USERNAME }} --password ${{ secrets.NOTARIZATION_PASSWORD }} --team-id ${{ secrets.TEAM_ID }} --wait
            xcrun stapler staple "$OUTPUT_PKG"
          }

          cd packaging
          
          # Always build the Update-Binaries-Only installer
          build_product_installer "Update-Binaries-Only" "false"

          # Optionally build the Full-Installer
          if [ "${{ env.INCLUDE_RESOURCES }}" = "true" ]; then
            build_product_installer "Full-Installer" "true"
          fi

      - name: Zip
        if: ${{ matrix.name == 'Linux' }}
        working-directory: ${{ env.ARTIFACTS_PATH }}
        run: 7z a -tzip "${{ env.ARTIFACT_NAME }}.zip" "-xr!lib${{ env.PRODUCT_NAME }}_SharedCode.a" .

      - name: Generate Installer
        if: ${{ matrix.name == 'Windows' }}
        run: |
          iscc "packaging\installer.iss"
          mv "packaging/Output/${{ env.ARTIFACT_NAME }}.exe" "${{ env.ARTIFACTS_PATH }}/"

      - name: Codesign with Azure Trusted Signing
        if: ${{ matrix.name == 'Windows' }}
        uses: azure/trusted-signing-action@v0.5.1
        with:
          # The Azure Active Directory tenant (directory) ID.
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}

          # The client (application) ID of an App Registration in the tenant.
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}

          # A client secret that was generated for the App Registration.
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

          # The Code Signing Account endpoint. The URI value must have a URI that aligns to the region your Code Signing Account and Certificate Profile you are specifying were created in during the setup of these resources.
          endpoint: ${{ secrets.AZURE_ENDPOINT }}

          # The Code Signing Account name.
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}

          # The Certificate Profile name.
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}

          # This signs all exes inside the folder
          files-folder: ${{ env.ARTIFACTS_PATH }}
          files-folder-filter: exe

      - name: Upload Exe (Windows)
        if: ${{ matrix.name == 'Windows' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}.exe
          path: "${{ env.ARTIFACTS_PATH }}/${{ env.ARTIFACT_NAME }}.exe"

      - name: Upload Zip (Linux)
        if: ${{ matrix.name == 'Linux' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}.zip
          path: "${{ env.ARTIFACTS_PATH }}/${{ env.ARTIFACT_NAME }}.zip"

      - name: Upload pkg (macOS)
        if: ${{ matrix.name == 'macOS' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}-installers
          path: packaging/${{ env.ARTIFACT_NAME }}*.pkg

  release:
    if: contains(github.ref, 'tags/v')
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - name: Get Artifacts
        uses: actions/download-artifact@v8

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          # download-artifact puts these files in their own dirs...
          # Using globs sidesteps having to pass the version around
          files: |
            */*.exe
            */*.zip
            */*.dmg
            */*.pkg
